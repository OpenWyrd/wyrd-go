name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: go mod tidy (verify)
        run: |
          go mod tidy
          # go.sum may not exist when there are no external deps yet —
          # only diff files that are tracked.
          changed=$(git status --porcelain go.mod go.sum 2>/dev/null || true)
          if [ -n "$changed" ]; then
            echo "go.mod / go.sum drift after tidy:"
            echo "$changed"
            git diff go.mod go.sum 2>/dev/null || true
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...
      - name: go build
        run: go build -o /tmp/wyrd-go ./cmd/wyrd-go
